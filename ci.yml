name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python tests ────────────────────────────────────────────────────────────
  python-test:
    name: Python Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pyyaml scipy pytest pytest-cov

      - name: Run tests
        run: |
          PYTHONPATH=python pytest tests/python/ -v \
            --tb=short \
            --cov=python \
            --cov-report=term-missing \
            --cov-report=xml
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Python lint ──────────────────────────────────────────────────────────────
  python-lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8 mypy torch numpy pyyaml
      - name: Flake8
        run: |
          flake8 python/ \
            --max-line-length=100 \
            --ignore=E501,W503,E203 \
            --exclude=python/configs/__pycache__
        continue-on-error: true
      - name: MyPy
        run: |
          mypy python/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ── C build + self-test ─────────────────────────────────────────────────────
  c-build:
    name: C Build & Self-Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Compile shared library (Linux)
        if: runner.os == 'Linux'
        run: |
          gcc -O2 -std=c17 -shared -fPIC \
              -o c/queue_stats.so c/queue_stats.c -lm
          echo "Built queue_stats.so"

      - name: Compile shared library (macOS)
        if: runner.os == 'macOS'
        run: |
          gcc -O2 -std=c17 -shared \
              -o c/queue_stats.dylib c/queue_stats.c -lm
          echo "Built queue_stats.dylib"

      - name: Run C self-test
        run: |
          gcc -O2 -std=c17 -DTEST_MAIN \
              -o c/test_queue c/queue_stats.c -lm
          ./c/test_queue

  # ── Java compile ────────────────────────────────────────────────────────────
  java-build:
    name: Java Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Compile Java sources
        run: |
          mkdir -p java/out
          find java/src -name "*.java" | xargs javac \
            --enable-preview --release 21 \
            -d java/out
          echo "Java compilation successful"

      - name: Check compiled classes
        run: |
          find java/out -name "*.class" | head -20
          echo "---"
          ls java/out/traffic/ -R

  # ── Integration smoke test ───────────────────────────────────────────────────
  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: [python-test, c-build]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pyyaml scipy

      - name: Build C library
        run: |
          gcc -O2 -std=c17 -shared -fPIC \
              -o c/queue_stats.so c/queue_stats.c -lm

      - name: Full training smoke test (10 episodes)
        run: |
          cd python
          python train.py \
            --cfg configs/default.yaml \
            --run ci_smoke \
            --seed 0
        env:
          PYTHONPATH: python
          INTELLISIGNAL_FAST_CI: "1"   # agents can check this env var to reduce episodes

      - name: Verify checkpoint was saved
        run: |
          ls -la python/results/ci_smoke/checkpoints/ 2>/dev/null || \
          ls -la results/ci_smoke/checkpoints/ 2>/dev/null || \
          echo "No checkpoint found (expected if fast CI mode skipped)"
